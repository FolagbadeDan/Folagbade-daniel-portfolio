
<!DOCTYPE html>
<html lang="en" class="dark" style="scroll-padding-top: 100px;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Primary Meta Tags -->
  <title>Folagbade Daniel | Digital Growth Manager & Product Strategist</title>
  <meta name="title" content="Folagbade Daniel | Digital Growth Manager & Product Strategist">
  <meta name="description" content="Digital Growth Manager with 6+ years experience in WordPress web design, performance marketing, SEO/AIO, and automation (Make.com, n8n, OpenClaw). Based in Lagos, Nigeria.">

  <!-- Open Graph / Facebook / LinkedIn -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://folagbadedan.com/">
  <meta property="og:title" content="Folagbade Daniel | Digital Growth Manager">
  <meta property="og:description" content="I help businesses grow faster through web design, performance marketing, and smart automation. 6+ years scaling brands across fintech, real estate, and Web3.">
  <meta property="og:image" content="https://i.ibb.co/Ps4vT8z4/folagbade-potrait.jpg">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://folagbadedan.com/">
  <meta property="twitter:title" content="Folagbade Daniel | Digital Growth Manager">
  <meta property="twitter:description" content="I help businesses grow faster through web design, performance marketing, and smart automation. 6+ years scaling brands across fintech, real estate, and Web3.">
  <meta property="twitter:image" content="https://i.ibb.co/Ps4vT8z4/folagbade-potrait.jpg">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
            accent1: '#f43f5e', // Rose
            accent2: '#0ea5e9', // Sky
            accent3: '#8b5cf6', // Violet
            accent4: '#10b981', // Emerald
            darkBg: '#09090b', // Zinc 950
            cardDark: '#18181b', // Zinc 900
          },
          fontFamily: {
            mono: ['Space Mono', 'monospace'],
          },
          animation: {
            'blob': 'blob 7s infinite',
            'float-3d': 'float 6s ease-in-out infinite',
            'shine': 'shine 8s linear infinite',
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0px) rotateX(2deg) rotateY(2deg)' },
              '50%': { transform: 'translateY(-15px) rotateX(-2deg) rotateY(-2deg)' },
            },
            shine: {
              from: { backgroundPosition: '200% center' },
              to: { backgroundPosition: '-200% center' },
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-noise: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }
    body {
      font-family: 'Inter', sans-serif;
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
    }
    .noise-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      content: "";
      opacity: 0.05;
      z-index: 9999;
      pointer-events: none;
      background-image: var(--bg-noise);
    }
    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
    }
    .dark .glass {
      background: rgba(24, 24, 27, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
    }
    .gradient-text {
      background: linear-gradient(to right, #6366f1, #8b5cf6, #f43f5e, #6366f1);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 8s linear infinite;
    }
    .dark .gradient-text {
      background: linear-gradient(to right, #818cf8, #a78bfa, #fb7185, #818cf8);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 8s linear infinite;
    }
    .bento-card {
      transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      position: relative;
      overflow: hidden;
      border-radius: 1.5rem;
    }
    .bento-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.15);
    }
    .dark .bento-card:hover {
       border-color: rgba(99, 102, 241, 0.3);
       box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.8), 0 0 20px rgba(99, 102, 241, 0.1);
    }
    .glow-bg {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, rgba(255,255,255,0) 70%);
      border-radius: 50%;
      filter: blur(40px);
      z-index: -1;
      opacity: 0.6;
    }
    .dark .glow-bg {
      background: radial-gradient(circle, rgba(99,102,241,0.2) 0%, rgba(0,0,0,0) 70%);
    }
    .perspective-1000 {
      perspective: 1000px;
    }
    .break-name {
      overflow-wrap: break-word;
      word-break: break-word;
      hyphens: auto;
    }
    @media (max-width: 640px) {
      html { scroll-padding-top: 80px; }
    }
  </style>

</head>
<body class="bg-slate-50 dark:bg-[#050505] text-slate-900 dark:text-slate-100 overflow-x-hidden transition-colors duration-500">
  <div class="noise-overlay"></div>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
